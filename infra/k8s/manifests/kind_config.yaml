kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraMounts:
  - hostPath: ./dataset
    containerPath: /mnt/dataset
    readOnly: true
  - hostPath: ./data
    containerPath: /mnt/data
    readOnly: false
- role: worker
  extraMounts:
  - hostPath: ./dataset
    containerPath: /mnt/dataset
    readOnly: true
  - hostPath: ./data
    containerPath: /mnt/data
    readOnly: false
- role: worker
  extraMounts:
  - hostPath: ./dataset
    containerPath: /mnt/dataset
    readOnly: true
  - hostPath: ./data
    containerPath: /mnt/data
    readOnly: false
