apiVersion: v1
kind: ServiceAccount
metadata:
  name: steering-server-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-reader
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: read-pods
subjects:
- kind: ServiceAccount
  name: steering-server-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: steering-server
spec:
  selector:
    app: steering-server
  ports:
  - name: https
    protocol: TCP
    port: 30500
    targetPort: 30500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: steering-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: steering-server
  template:
    metadata:
      labels:
        app: steering-server
    spec:
      serviceAccountName: steering-server-sa
      containers:
      - name: steering
        image: content-steering/steering-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 30500
        env: []
        resources:
          limits:
            cpu: "2000m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"

        volumeMounts:
        - name: certs
          mountPath: /app/certs/steering-service
          readOnly: true
        - name: data
          mountPath: /app/data
        - name: code-vol
          mountPath: /app/src/steering/server.py
          subPath: server.py
        - name: code-vol
          mountPath: /app/src/steering/strategies/ppo.py
          subPath: ppo.py
        - name: code-vol
          mountPath: /app/src/steering/strategies/sac.py
          subPath: sac.py
        - name: code-vol
          mountPath: /app/src/steering/strategies/ucb.py
          subPath: ucb.py
        - name: code-vol
          mountPath: /app/src/steering/strategies/thompson.py
          subPath: thompson.py
        - name: code-vol
          mountPath: /app/src/steering/strategies/epsilon_greedy.py
          subPath: epsilon_greedy.py
        - name: code-vol
          mountPath: /app/src/steering/real_latency.py
          subPath: real_latency.py
        - name: code-vol
          mountPath: /app/src/steering/context.py
          subPath: context.py
        - name: code-vol
          mountPath: /app/src/steering/strategies/lin_ucb.py
          subPath: lin_ucb.py
        - name: code-vol
          mountPath: /app/config/strategies.json
          subPath: strategies.json
      volumes:
      - name: certs
        secret:
          secretName: steering-server-certs
      - name: code-vol
        configMap:
          name: steering-code
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: delivery-node-caddyfile
  labels:
    app: delivery-node
data:
  Caddyfile: |
    (cors) {
      @cors_preflight method OPTIONS

      header {
        Access-Control-Allow-Origin "*"
        Access-Control-Expose-Headers "Authorization"
      }

      handle @cors_preflight {
        header {
          Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
          Access-Control-Allow-Headers "*"
          Access-Control-Max-Age "3600"
        }
        respond "" 204
      }
    }


    :80 {
        root * /srv
        file_server

        header Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
        import cors
    }

    :443 {
        tls /root/certs/delivery-node.pem /root/certs/delivery-node-key.pem

        root * /srv
        file_server

        header Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
        import cors
    }
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-node-1
spec:
  selector:
    app: delivery-node
    cache-id: "1"
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  - name: https
    protocol: TCP
    port: 443
    targetPort: 443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-node-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-node
      cache-id: "1"
  template:
    metadata:
      labels:
        app: delivery-node
        cache-id: "1"
    spec:
      containers:
      - name: caddy
        image: content-steering/delivery-node:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "tc qdisc add dev eth0 root netem delay 5ms 1ms distribution normal || true"]
        env:
        - name: LATITUDE
          value: "-23.0"
        - name: LONGITUDE
          value: "-47.0"
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
          requests:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: certs
          mountPath: /root/certs
          readOnly: true
        - name: caddyfile
          mountPath: /etc/caddy
        - name: dataset
          mountPath: /srv
      volumes:
      - name: certs
        secret:
          secretName: delivery-node-1-certs
      - name: caddyfile
        configMap:
          name: delivery-node-caddyfile
      - name: dataset
        hostPath:
          path: /mnt/dataset
---
